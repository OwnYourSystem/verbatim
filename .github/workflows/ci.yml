name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Backend — lint + test
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Frontend — type-check + build
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite + PWA SW)
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Deploy to self-hosted VPS via SSH (main branch only)
  #
  #    Required GitHub secrets:
  #      VPS_HOST     — server IP or hostname
  #      VPS_USER     — SSH user (e.g. root or deploy)
  #      VPS_SSH_KEY  — private SSH key (add the matching public key to the server)
  #
  #    The server must have Docker + Docker Compose installed and the repo
  #    cloned to /opt/verbatim with .env.production present.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/verbatim
            git pull origin main
            docker compose up --build -d
            echo "Deploy complete — checking health..."
            sleep 10
            curl -sf http://localhost:8080/health | python3 -c "import sys,json; d=json.load(sys.stdin); print('Backend healthy:', d)"
