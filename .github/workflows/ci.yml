name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Backend — lint + test
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Frontend — type-check + build
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite + PWA SW)
        run: npm run build

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Deploy backend — Render auto-deploys on push to main via render.yaml.
  #    This job triggers a deploy hook to ensure migrations run after build.
  # ─────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    needs: backend
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render deploy hook
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -sf "$RENDER_DEPLOY_HOOK_URL" > /dev/null
            echo "Render deploy triggered"
          else
            echo "RENDER_DEPLOY_HOOK_URL not set — skipping deploy hook (Render auto-deploys on push)"
          fi
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
