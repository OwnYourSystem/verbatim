name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# ---------------------------------------------------------------------------
# Shared env — override in repo secrets for production
# ---------------------------------------------------------------------------
env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION || 'europe-west1' }}
  AR_REPO: mindanchor
  SERVICE_NAME: mindanchor-api

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # 1. Backend — lint + test
  # ─────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Test (pytest)
        run: pytest -q

  # ─────────────────────────────────────────────────────────────────────────
  # 2. Frontend — type-check + build
  # ─────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + vite + PWA SW)
        run: npm run build

      - name: Upload dist artifact
        # Only on main — deploy job picks this up
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────
  # 3. Docker build + push to Artifact Registry (main branch only)
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: Docker (build + push)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write   # Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/api"
          docker build \
            --tag "${IMAGE}:${{ github.sha }}" \
            --tag "${IMAGE}:latest" \
            ./backend
          docker push "${IMAGE}:${{ github.sha }}"
          docker push "${IMAGE}:latest"
          echo "IMAGE=${IMAGE}:${{ github.sha }}" >> $GITHUB_ENV

  # ─────────────────────────────────────────────────────────────────────────
  # 4. Deploy backend to Cloud Run (main branch only)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy backend (Cloud Run)
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        run: |
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/api:${{ github.sha }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu 1 \
            --port 8080 \
            --set-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:mindanchor-db" \
            --service-account "mindanchor-api@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-secrets "DATABASE_URL=mindanchor-db-url:latest" \
            --set-secrets "JWT_SECRET=mindanchor-jwt-secret:latest" \
            --set-secrets "ANTHROPIC_API_KEY=mindanchor-anthropic-key:latest" \
            --set-secrets "CORS_ORIGINS=mindanchor-cors-origins:latest" \
            --set-env-vars "ENVIRONMENT=production" \
            --project "${{ env.PROJECT_ID }}"

      - name: Run Alembic migrations
        run: |
          # Use Cloud SQL Auth Proxy sidecar via gcloud sql connect alternative:
          # Cloud Run Jobs would be ideal here; for now we run migrations as a
          # one-off Cloud Run job using the same image.
          IMAGE="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.AR_REPO }}/api:${{ github.sha }}"
          gcloud run jobs create mindanchor-migrate-${{ github.sha }} \
            --image "$IMAGE" \
            --region "${{ env.REGION }}" \
            --set-cloudsql-instances "${{ env.PROJECT_ID }}:${{ env.REGION }}:mindanchor-db" \
            --service-account "mindanchor-api@${{ env.PROJECT_ID }}.iam.gserviceaccount.com" \
            --set-secrets "DATABASE_URL=mindanchor-db-url:latest" \
            --command "alembic" \
            --args "upgrade,head" \
            --max-retries 1 \
            --project "${{ env.PROJECT_ID }}" \
            --execute-now \
            --wait || true
          # Clean up old migration jobs (keep last 3)
          gcloud run jobs list \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --filter "metadata.name~mindanchor-migrate" \
            --format "value(metadata.name)" \
            | sort -r | tail -n +4 \
            | xargs -I {} gcloud run jobs delete {} \
              --region "${{ env.REGION }}" \
              --project "${{ env.PROJECT_ID }}" \
              --quiet || true

      - name: Print service URL
        run: |
          gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region "${{ env.REGION }}" \
            --project "${{ env.PROJECT_ID }}" \
            --format "value(status.url)"

  # ─────────────────────────────────────────────────────────────────────────
  # 5. Deploy frontend to Vercel (main branch only)
  # ─────────────────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    needs: [frontend, deploy-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Deploy to Vercel
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npm install -g vercel --silent
          vercel deploy --prod --prebuilt --token "$VERCEL_TOKEN"
