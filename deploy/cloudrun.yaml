apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: mindanchor-api
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        # Scale to zero when idle — cost-efficient for a personal tool
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "3"
        # Cloud SQL connection
        run.googleapis.com/cloudsql-instances: "PROJECT_ID:REGION:mindanchor-db"
    spec:
      serviceAccountName: mindanchor-api@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/mindanchor/api:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: ENVIRONMENT
              value: production
            - name: PORT
              value: "8080"
          envFrom: []
          # Secrets injected via Secret Manager
          # Run: gcloud run services update mindanchor-api \
          #   --set-secrets DATABASE_URL=mindanchor-db-url:latest \
          #   --set-secrets JWT_SECRET=mindanchor-jwt-secret:latest \
          #   --set-secrets ANTHROPIC_API_KEY=mindanchor-anthropic-key:latest \
          #   --set-secrets CORS_ORIGINS=mindanchor-cors-origins:latest
