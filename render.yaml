services:
  - type: web
    name: mindanchor-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: mindanchor-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PASSWORD_HASH
        value: '$2b$12$BlCKEn/b8F9dhaKz7Z.yn.gnKVj4P/Vly3DLK7w62zv9VeWljfR/i'
      - key: ANTHROPIC_API_KEY
        sync: false          # set manually in Render dashboard
      - key: CORS_ORIGINS
        sync: false          # set to your Vercel URL after deploy
    healthCheckPath: /health
    autoDeploy: true

databases:
  - name: mindanchor-db
    databaseName: mindanchor
    user: mindanchor
    plan: free
