# Cloud Build pipeline for the FRONTEND Cloud Run service (verbatim-frontend).
#
# Wire a trigger to this file so frontend/ changes auto-deploy (today the
# frontend is deployed manually). One-time trigger creation:
#
#   gcloud builds triggers create github \
#     --name=verbatim-frontend \
#     --repo-owner=OwnYourSystem --repo-name=Verbatim \
#     --branch-pattern='^main$' \
#     --build-config=frontend/cloudbuild.yaml \
#     --included-files='frontend/**' \
#     --region=europe-north2 --project=<VERBATIM_GCP_PROJECT_ID>
#
# --included-files limits the trigger to frontend changes so it doesn't fire on
# backend-only commits (the existing backend trigger handles those).
steps:
  # 1. Build the image from frontend/Dockerfile.
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_IMAGE}:$COMMIT_SHA
      - -f
      - frontend/Dockerfile
      - frontend

  # 2. Push to Artifact Registry.
  - name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}:$COMMIT_SHA"]

  # 3. Deploy to Cloud Run (env vars wire nginx → the backend service).
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - verbatim-frontend
      - --image=${_IMAGE}:$COMMIT_SHA
      - --region=europe-north2
      - --platform=managed
      - --port=8080
      - --allow-unauthenticated
      - --set-env-vars=BACKEND_ORIGIN=${_BACKEND_ORIGIN},BACKEND_HOST=${_BACKEND_HOST}

substitutions:
  # Fill these in once the Verbatim GCP project + backend Cloud Run service exist.
  _IMAGE: europe-north2-docker.pkg.dev/<VERBATIM_GCP_PROJECT_ID>/cloud-run-source-deploy/verbatim-frontend
  _BACKEND_ORIGIN: https://<VERBATIM_BACKEND_RUN_URL>
  _BACKEND_HOST: <VERBATIM_BACKEND_RUN_URL>

images:
  - "${_IMAGE}:$COMMIT_SHA"

options:
  logging: CLOUD_LOGGING_ONLY
