# nginx config TEMPLATE for the Cloud Run frontend.
#
# This file is copied to /etc/nginx/templates/default.conf.template in the image;
# the official nginx entrypoint expands ${PORT}, ${BACKEND_ORIGIN} and
# ${BACKEND_HOST} via envsubst at container start (only real env vars are
# substituted, so nginx runtime vars like $uri / $host are left intact).
server {
    listen       ${PORT};
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # API proxy → backend, server-side (no CORS hop in the browser).
    # The trailing slash on proxy_pass strips the matched "/api/" prefix, so
    # /api/tasks → <backend>/tasks (the FastAPI routers are mounted at root).
    location /api/ {
        proxy_pass            ${BACKEND_ORIGIN}/;
        proxy_http_version    1.1;
        proxy_set_header      Host              ${BACKEND_HOST};
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
    }

    # The service worker must never be cached so updates land immediately.
    location = /sw.js {
        add_header Cache-Control       "public, max-age=0, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # Content-hashed build assets are immutable.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — every other path serves the app shell.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
