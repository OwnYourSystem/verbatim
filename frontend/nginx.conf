server {
    listen ${PORT};
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # PWA service worker — must not be cached
    location = /sw.js {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        try_files $uri =404;
    }

    # Immutable hashed assets
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # API proxy — strip /api prefix and forward to the backend.
    # BACKEND_ORIGIN / BACKEND_HOST are injected at container start (envsubst):
    #   docker-compose → http://backend:8080 / backend
    #   Cloud Run      → https://<backend>.run.app / <backend>.run.app
    location /api/ {
        proxy_pass            ${BACKEND_ORIGIN}/;
        proxy_http_version    1.1;
        proxy_set_header      Host              ${BACKEND_HOST};
        proxy_set_header      X-Real-IP         $remote_addr;
        proxy_set_header      X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout    120s;
    }

    # SPA fallback — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
