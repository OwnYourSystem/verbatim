<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#FBF8F3" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Verbatim" />
    <meta name="mobile-web-app-capable" content="yes" />
    <script>
      // Applied before paint so the correct theme is active from the first frame
      // (React sets this too, but only after mount — this avoids a flash).
      try {
        if (localStorage.getItem("ma_theme") === "dark") {
          document.documentElement.classList.add("dark");
        }
      } catch {
        /* localStorage unavailable (private mode etc.) — default light theme applies */
      }
    </script>

    <!-- SEO -->
    <meta name="description" content="Your external brain — AI project manager, scrum master &amp; calendar." />
    <meta name="application-name" content="Verbatim" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@600&display=swap"
      rel="stylesheet"
    />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <title>Verbatim</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
