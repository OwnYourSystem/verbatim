# Local full-stack dev: Postgres + backend (FastAPI) + frontend (nginx).
# Mirrors the Cloud Run topology so the frontend proxies /api/ → backend.
#
#   docker compose up --build
#   # frontend → http://localhost:8080 , backend → http://localhost:8000
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mindanchor
      POSTGRES_PASSWORD: mindanchor
      POSTGRES_DB: mindanchor
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindanchor"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://mindanchor:mindanchor@db:5432/mindanchor
      JWT_SECRET: dev-secret-change-me
      PORT: "8000"
      # ANTHROPIC_API_KEY: ""   # omit → offline stub
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      PORT: "8080"
      BACKEND_ORIGIN: http://backend:8000
      BACKEND_HOST: backend
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  pgdata:
